      if (rows.length === 0) return [];

      // ヘッダー行のBOMや見えない制御文字を完全に除去しトリミング
      const headers = rows[0].map(h => h.replace(/^\ufeff/, '').replace(/[\u200B-\u200D\uFEFF]/g, '').trim());
      const data = [];
      for (let i = 1; i < rows.length; i++) {
        if (rows[i].length < headers.length && rows[i].join('') === '') continue;
        const obj = {};
        headers.forEach((h, idx) => {
          // セルの値からも不要な制御文字を完璧にトリミング
          obj[h] = rows[i][idx] ? rows[i][idx].replace(/[\u200B-\u200D\uFEFF]/g, '').trim() : '';
        });
        data.push(obj);
      }
      return data;
    };

    // --- レート計算ヘルパー ---
    const getRate = (num, den) => den > 0 ? parseFloat((num / den * 100).toFixed(1)) : 0;

    // --- データ集計ロジック ---
    const processPOGData = (horses, races) => {
      const ownersObj = {};
      const overall = { sires: {}, trainers: {}, jockeys: {} };

      // 1. 馬データの集計 (表記揺れに完全対応)
      horses.forEach(h => {
        // カラム名の表記揺れを自動で吸収
        const oName = h['オーナー'] || h['オーナー名'] || h['owner'] || h['ownerName'];
        if (!oName) return;

        if (!ownersObj[oName]) {
          ownersObj[oName] = {
            name: oName, horses: [], points: 0,
            stats: {
              starts: 0, wins: 0, top2: 0, top3: 0, top5: 0,
              record: [0, 0, 0, 0, 0, 0], // [1着, 2着, 3着, 4着, 5着, 着外]
              trainers: {}, sires: {}, centers: {}, draftRanks: {},
              jockeys: {}, trackType: { turf: { points: 0 }, dirt: { points: 0 } }
            }
          };
        }

        // 数値項目の取得と表記揺れへの対応
        const prize = parseInt(h['ポイント'] || h['獲得ポイント'] || h['獲得本賞金'] || h['賞金'] || '0') || 0;
        const draftRank = parseInt(h['指名順位'] || h['指名順'] || '0') || 0;
        const sire = h['父'] || h['sire'] || '不明';
        const trainer = h['厩舎'] || h['trainer'] || '不明';
        const center = h['美浦/栗東'] || h['所属'] || (h['厩舎'] && h['厩舎'].includes('美浦') ? '美浦' : (h['厩舎'] && h['厩舎'].includes('栗東') ? '栗東' : '不明'));

        ownersObj[oName].points += prize;

        if (!ownersObj[oName].stats.trainers[trainer]) {
          ownersObj[oName].stats.trainers[trainer] = { points: 0, starts: 0, wins: 0, record: [0,0,0,0,0,0] };
        }
        ownersObj[oName].stats.trainers[trainer].points += prize;

        if (!ownersObj[oName].stats.sires[sire]) {
          ownersObj[oName].stats.sires[sire] = { points: 0, starts: 0, wins: 0, record: [0,0,0,0,0,0] };
        }
        ownersObj[oName].stats.sires[sire].points += prize;

        if (!overall.sires[sire]) overall.sires[sire] = { name: sire, points: 0, wins: 0, starts: 0, record: [0,0,0,0,0,0] };
        overall.sires[sire].points += prize;

        if (!overall.trainers[trainer]) overall.trainers[trainer] = { name: trainer, points: 0, wins: 0, starts: 0, record: [0,0,0,0,0,0] };
        overall.trainers[trainer].points += prize;

        if (!ownersObj[oName].stats.centers[center]) {
          ownersObj[oName].stats.centers[center] = { points: 0 };
        }
        ownersObj[oName].stats.centers[center].points += prize;

        if (!ownersObj[oName].stats.draftRanks[draftRank]) {
          ownersObj[oName].stats.draftRanks[draftRank] = { points: 0 };
        }
        ownersObj[oName].stats.draftRanks[draftRank].points += prize;

        ownersObj[oName].horses.push({
          name: h['馬名'] || h['horseName'], points: prize, starts: 0, wins: 0, record: [0,0,0,0,0,0],
          sire: sire, trainer: trainer, center: center, draftRank: draftRank, races: []
        });
      });

      // 2. 競走データの集計 (表記揺れに完全対応)
      races.forEach(r => {
        const oName = r['オーナー名'] || r['オーナー'] || r['ownerName'] || r['owner'];
        const hName = r['馬名'] || r['horseName'];
        if (!oName || !hName) return;

        if (ownersObj[oName]) {
          let horse = ownersObj[oName].horses.find(h => h.name === hName);
          if (!horse) return;

          const rankStr = String(r['着順'] || '').replace(/着/g, '').trim();
          const rankNum = parseInt(rankStr);
          let idx = 5;

          if (!isNaN(rankNum) && rankNum >= 1 && rankNum <= 5) {
            idx = rankNum - 1;
          } else if (rankStr.includes('除') || rankStr.includes('中') || rankStr.includes('取')) {
            idx = 5;
          } else if (!isNaN(rankNum) && rankNum > 5) {
            idx = 5;
          }

          const sire = horse.sire;
          const trainer = horse.trainer;
          let jockey = r['騎手'] || r['jockey'] || '不明';
          if (!jockey) jockey = '不明';
          const rPrize = parseInt(String(r['獲得賞金/ポイント'] || r['賞金'] || '0').replace(/,/g, '')) || 0;

          ownersObj[oName].stats.starts += 1;
          ownersObj[oName].stats.record[idx] += 1;
          if (idx === 0) ownersObj[oName].stats.wins += 1;
          if (idx <= 1) ownersObj[oName].stats.top2 += 1;
          if (idx <= 2) ownersObj[oName].stats.top3 += 1;
          if (idx <= 4) ownersObj[oName].stats.top5 += 1;

          horse.starts += 1;
          horse.record[idx] += 1;
          if (idx === 0) horse.wins += 1;
          horse.races.push(r);

          ownersObj[oName].stats.trainers[trainer].starts += 1;
          ownersObj[oName].stats.trainers[trainer].record[idx] += 1;
          if (idx === 0) ownersObj[oName].stats.trainers[trainer].wins += 1;

          ownersObj[oName].stats.sires[sire].starts += 1;
          ownersObj[oName].stats.sires[sire].record[idx] += 1;
          if (idx === 0) ownersObj[oName].stats.sires[sire].wins += 1;

          if (!ownersObj[oName].stats.jockeys[jockey]) {
            ownersObj[oName].stats.jockeys[jockey] = { starts: 0, wins: 0, record: [0,0,0,0,0,0], points: 0 };
          }
          ownersObj[oName].stats.jockeys[jockey].starts += 1;
          ownersObj[oName].stats.jockeys[jockey].record[idx] += 1;
          ownersObj[oName].stats.jockeys[jockey].points += rPrize;
          if (idx === 0) ownersObj[oName].stats.jockeys[jockey].wins += 1;

          overall.trainers[trainer].starts += 1;
          overall.trainers[trainer].record[idx] += 1;
          if (idx === 0) overall.trainers[trainer].wins += 1;

          overall.sires[sire].starts += 1;
          overall.sires[sire].record[idx] += 1;
          if (idx === 0) overall.sires[sire].wins += 1;

          if (!overall.jockeys[jockey]) {
            overall.jockeys[jockey] = { name: jockey, points: 0, wins: 0, starts: 0, record: [0,0,0,0,0,0] };
          }
          overall.jockeys[jockey].starts += 1;
          overall.jockeys[jockey].record[idx] += 1;
          overall.jockeys[jockey].points += rPrize;
          if (idx === 0) overall.jockeys[jockey].wins += 1;

          const dist = String(r['距離'] || '');
          if (dist.includes('芝')) {
            ownersObj[oName].stats.trackType.turf.points += rPrize;
          } else if (dist.includes('ダ') || dist.includes('ダート')) {
            ownersObj[oName].stats.trackType.dirt.points += rPrize;
          }
        }
      });

      const results = Object.values(ownersObj).map(owner => {
        const winRate = getRate(owner.stats.wins, owner.stats.starts);
        const top2Rate = getRate(owner.stats.top2, owner.stats.starts);
        const top5Rate = getRate(owner.stats.top5, owner.stats.starts);

        owner.horses.sort((a, b) => b.points - a.points);

        owner.horses.forEach(h => {
            let bestHorseRace = { name: '未勝利', grade: 0, prize: 0 };
            h.races.forEach(r => {
                 if (String(r['着順'] || '').replace(/着/g, '').trim() === '1') {
                    const p = parseInt(String(r['獲得賞金/ポイント'] || r['賞金'] || '0').replace(/,/g, '')) || 0;
                    let g = 0;
                    const raceNameStr = String(r['レース名'] || '').toUpperCase();
                    const gradeStr = String(r['グレード'] || '').toUpperCase() + raceNameStr;

                    if (gradeStr.includes('G1') || gradeStr.includes('GⅠ') || gradeStr.includes('JPN1') || gradeStr.includes('JPNⅠ')) g = 3;
                    else if (gradeStr.includes('G2') || gradeStr.includes('GⅡ') || gradeStr.includes('JPN2') || gradeStr.includes('JPNⅡ')) g = 2;
                    else if (gradeStr.includes('G3') || gradeStr.includes('GⅢ') || gradeStr.includes('JPN3') || gradeStr.includes('JPNⅢ')) g = 1;

                    if (g > bestHorseRace.grade || (g === bestHorseRace.grade && p > bestHorseRace.prize)) {
                       bestHorseRace = { name: r['レース名'] || '未勝利', prize: p, grade: g };
                    }
                 }
            });
            h.majorWin = h.wins > 0 ? bestHorseRace.name : (h.starts > 0 ? '未勝利' : '未デビュー');
            h.isGraded = bestHorseRace.grade > 0;
        });

        let topHorses = owner.horses.filter(h => h.isGraded || h.points >= 3000);
        if (topHorses.length === 0 && owner.horses.length > 0) {
          topHorses = [owner.horses[0]];
        }

        const defaultStats = { name: '-', starts: 0, wins: 0, winRate: 0, points: 0, record: [0,0,0,0,0,0] };

        const siresList = Object.entries(owner.stats.sires).map(([name, data]) => ({ name, ...data }));
        const bestSire = [...siresList].sort((a, b) => b.points - a.points)[0] || defaultStats;
        const mostUsedSire = [...siresList].sort((a, b) => b.starts - a.starts)[0] || defaultStats;

        const trainersList = Object.entries(owner.stats.trainers).map(([name, data]) => ({ name, ...data }));
        const bestTrainer = [...trainersList].sort((a, b) => b.points - a.points)[0] || defaultStats;

        const jockeysList = Object.entries(owner.stats.jockeys).map(([name, data]) => ({ name, ...data, winRate: getRate(data.wins, data.starts) }));
        const mostRidesJockey = [...jockeysList].sort((a, b) => b.starts - a.starts)[0] || defaultStats;
        const qualifiedJockeys = jockeysList.filter(j => j.starts >= 3);
        const bestRateJockey = qualifiedJockeys.length > 0
            ? [...qualifiedJockeys].sort((a, b) => b.winRate - a.winRate)[0]
            : ([...jockeysList].sort((a, b) => b.winRate - a.winRate)[0] || defaultStats);

        const mihoPt = owner.stats.centers['美浦']?.points || 0;
        const rittoPt = owner.stats.centers['栗東']?.points || 0;
        const centerTotal = mihoPt + rittoPt;
        const mihoRate = getRate(mihoPt, centerTotal);
        const rittoRate = getRate(rittoPt, centerTotal);

        const turfPt = owner.stats.trackType.turf.points || 0;
        const dirtPt = owner.stats.trackType.dirt.points || 0;
        const trackTotal = turfPt + dirtPt;
        const turfRate = getRate(turfPt, trackTotal);
        const dirtRate = getRate(dirtPt, trackTotal);

        let topDraftPt = 0, lowDraftPt = 0;
        for (let i = 1; i <= 15; i++) {
            if (i <= 5) topDraftPt += (owner.stats.draftRanks[i]?.points || 0);
            else lowDraftPt += (owner.stats.draftRanks[i]?.points || 0);
        }
        const draftTotal = topDraftPt + lowDraftPt;
        const topDraftRate = getRate(topDraftPt, draftTotal);
        const lowDraftRate = getRate(lowDraftPt, draftTotal);

        const imageHorse = owner.horses.find(h => HORSE_IMAGES[h.name]);
        const image = imageHorse ? { horseName: imageHorse.name, url: HORSE_IMAGES[imageHorse.name] } : null;

        return {
          name: owner.name, points: owner.points, topHorses: topHorses,
          topics: OWNER_TOPICS[owner.name] || DEFAULT_TOPICS,
          image: image,
          stats: {
             startsValue: owner.stats.starts, winsValue: owner.stats.wins, top2Value: owner.stats.top2, top5Value: owner.stats.top5,
             winRateValue: winRate, top2RateValue: top2Rate, top5RateValue: top5Rate, record: owner.stats.record,
             bestSire: bestSire, mostUsedSire: mostUsedSire, bestTrainer: bestTrainer, mostRidesJockey: mostRidesJockey, bestRateJockey: bestRateJockey,
             centerAnalysis: { miho: mihoRate, ritto: rittoRate }, draftAnalysis: { top: topDraftRate, low: lowDraftRate }, trackAnalysis: { turf: turfRate, dirt: dirtRate }
          },
          horses: owner.horses
        };
      });

      const processOverallItem = (item) => {
        const starts = item.starts;
        const record = item.record;
        item.winRate = getRate(record[0], starts);
        item.top2Rate = getRate(record[0] + record[1], starts);
        item.top5Rate = getRate(record[0] + record[1] + record[2] + record[3] + record[4], starts);
        return item;
      };

      const overallData = {
        sires: Object.values(overall.sires).map(processOverallItem).sort((a, b) => b.points - a.points).slice(0, 10),
        trainers: Object.values(overall.trainers).map(processOverallItem).sort((a, b) => b.points - a.points).slice(0, 10),
        jockeys: Object.values(overall.jockeys).map(processOverallItem).sort((a, b) => b.points - a.points).slice(0, 10),
      };

      results.sort((a,b) => b.points - a.points);
      const startsSorted = [...results].sort((a,b) => b.stats.startsValue - a.stats.startsValue);
      const winRateSorted = [...results].sort((a,b) => b.stats.winRateValue - a.stats.winRateValue);
      const top2RateSorted = [...results].sort((a,b) => b.stats.top2RateValue - a.stats.top2RateValue);
      const top5RateSorted = [...results].sort((a,b) => b.stats.top5RateValue - a.stats.top5RateValue);

      results.forEach((r, idx) => {
        r.rank = idx + 1;
        r.color = r.rank === 1 ? 'from-yellow-600/30 to-slate-900' : r.rank === 2 ? 'from-slate-500/30 to-slate-900' : r.rank === 3 ? 'from-amber-800/30 to-slate-900' : 'from-slate-800/30 to-slate-900';
        r.borderColor = r.rank === 1 ? 'border-yellow-500/50' : r.rank === 2 ? 'border-slate-400/50' : r.rank === 3 ? 'border-amber-600/50' : 'border-slate-800';
        r.textColor = r.rank === 1 ? 'text-yellow-400' : r.rank === 2 ? 'text-slate-300' : r.rank === 3 ? 'text-amber-500' : 'text-slate-400';

        r.stats.starts = { value: r.stats.startsValue, rank: startsSorted.findIndex(x => x.name === r.name) + 1 };
        r.stats.winRate = { value: r.stats.winRateValue, rank: winRateSorted.findIndex(x => x.name === r.name) + 1 };
        r.stats.top2Rate = { value: r.stats.top2RateValue, rank: top2RateSorted.findIndex(x => x.name === r.name) + 1 };
        r.stats.top5Rate = { value: r.stats.top5RateValue, rank: top5RateSorted.findIndex(x => x.name === r.name) + 1 };
      });

      return { results, overall: overallData };
    };

    // --- Atomic Presentation Components ---
    const RankBadge = ({ rank }) => {
      if (rank === 1) return <span className="bg-gradient-to-r from-yellow-500 to-amber-500 text-slate-950 text-xs font-black px-2.5 py-1 rounded shadow-lg flex items-center justify-center tracking-wider"><IconCrown size={12} className="mr-1 animate-pulse" /> 1位 王者</span>;
      if (rank === 2) return <span className="bg-gradient-to-r from-slate-300 to-slate-400 text-slate-950 text-xs font-black px-2.5 py-1 rounded shadow-lg flex items-center justify-center tracking-wider">2位</span>;
      if (rank === 3) return <span className="bg-gradient-to-r from-amber-700 to-amber-800 text-white text-xs font-black px-2.5 py-1 rounded shadow-lg flex items-center justify-center tracking-wider">3位</span>;
      return <span className="text-slate-300 bg-slate-900 border border-slate-700 text-xs px-2.5 py-1 rounded tracking-wider font-bold">{rank}位</span>;
    };

    const LargeStatBox = ({ label, value, subtext, rank, icon, glowClass }) => (
      <div className={`rounded-2xl p-5 md:p-6 border flex flex-col items-center justify-center relative overflow-hidden bg-slate-900/40 backdrop-blur-md transition-all duration-300 hover:translate-y-[-4px] ${glowClass}`}>
        <div className="flex items-center gap-2 text-slate-400 text-xs md:text-sm font-semibold mb-2 z-10">{icon} {label}</div>
        <div className="flex flex-col items-center gap-1.5 z-10">
          <p className="text-4xl md:text-5xl font-black text-white leading-none tracking-tight font-mono">{value}</p>
          <p className="text-slate-400 text-[10px] md:text-xs font-medium bg-slate-950/60 px-2.5 py-1 rounded-full">{subtext}</p>
        </div>
        <div className="absolute top-3 right-3 z-10"><RankBadge rank={rank} /></div>
      </div>
    );

    const AttributeRow = ({ icon, label, data, record }) => (
      <div className="flex items-center justify-between py-2.5 border-b border-slate-800/60 last:border-0 last:pb-0">
        <div className="flex items-center gap-3">
          <div className="text-slate-400 bg-slate-950/40 p-2 rounded-xl border border-slate-800/40">{icon}</div>
          <div>
            <p className="text-[10px] text-slate-500 font-bold tracking-wider uppercase mb-0.5">{label}</p>
            <div className="flex items-baseline gap-2">
               <p className="text-sm font-bold text-white leading-none">{data.name}</p>
               {record && <p className="text-[10px] text-slate-400 font-mono leading-none tracking-wider">{record}</p>}
            </div>
          </div>
        </div>
        <div className="flex flex-col items-end gap-1">
          <span className="text-yellow-400 text-xs font-bold font-mono bg-yellow-400/5 border border-yellow-500/10 px-2 py-0.5 rounded-lg">{data.detail}</span>
        </div>
      </div>
    );

    const RatioBar = ({ leftLabel, leftValue, leftColor, rightLabel, rightValue, rightColor }) => (
      <div className="mt-3 bg-slate-950/30 p-2.5 rounded-xl border border-slate-900/50">
        <div className="flex justify-between text-[11px] mb-1.5 text-slate-300 font-bold">
          <span className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full ${leftColor}`}></div>{leftLabel} {leftValue}%</span>
          <span className="flex items-center gap-1.5">{rightLabel} {rightValue}%<div className={`w-2 h-2 rounded-full ${rightColor}`}></div></span>
        </div>
        <div className="w-full h-2 bg-slate-950 rounded-full overflow-hidden flex shadow-inner">
          <div className={`h-full ${leftColor} transition-all duration-1000`} style={{ width: `${leftValue}%` }}></div>
          <div className={`h-full ${rightColor} transition-all duration-1000`} style={{ width: `${rightValue}%` }}></div>
        </div>
      </div>
    );

    // --- 起動時に埋め込みCSVを自動解析 ---
    const initEmbeddedData = () => {
      try {
        const horses = csvToArray(EMBEDDED_HORSE_CSV);
        const races = csvToArray(EMBEDDED_RACE_CSV);
        const processed = processPOGData(horses, races);
        if (processed.results && processed.results.length > 0) {
          return { ok: true, results: processed.results, overall: processed.overall, error: '' };
        }
        return { ok: false, results: [], overall: null, error: '埋め込みCSVデータの解析結果が0件でした。' };
      } catch (e) {
        console.error('Embedded CSV parse error:', e);
        return { ok: false, results: [], overall: null, error: `埋め込みCSV解析エラー：${e.message}` };
      }
    };

    // --- Main App Component ---
    function App() {
      const [embedInit] = useState(() => initEmbeddedData());
      const [step, setStep] = useState(embedInit.ok ? 0 : -1);
      const [isVisible, setIsVisible] = useState(true);
      const [horseCsvText, setHorseCsvText] = useState('');
      const [raceCsvText, setRaceCsvText] = useState('');
      const [resultsData, setResultsData] = useState(embedInit.results);
      const [overallData, setOverallData] = useState(embedInit.overall);
      const [errorMessage, setErrorMessage] = useState(embedInit.error);

      // 文字コード自動判定（「オーナー」や「馬名」などの必須単語が含まれるかを厳格にチェック）
      const handleFileUpload = (e, type) => {
        const file = e.target.files[0];
        if (file) {
          setErrorMessage('');
          const reader = new FileReader();
          reader.onload = (evt) => {
            const text = evt.target.result;

            // UTF-8 で正しく解釈できたかを、既知の主要ヘッダー文字列の有無で判定
            const hasUtf8Keywords = text.includes('オーナー') || text.includes('馬名') || text.includes('指名');
            const hasReplacementChar = text.includes('\ufffd'); // デコード失敗の代替文字

            if (!hasUtf8Keywords || hasReplacementChar) {
              const sjisReader = new FileReader();
              sjisReader.onload = (sjisEvt) => {
                if (type === 'horse') setHorseCsvText(sjisEvt.target.result);
                if (type === 'race') setRaceCsvText(sjisEvt.target.result);
              };
              sjisReader.readAsText(file, 'Shift_JIS');
            } else {
              if (type === 'horse') setHorseCsvText(text);
              if (type === 'race') setRaceCsvText(text);
            }
          };
          reader.readAsText(file, 'UTF-8');
        }
      };

      const processDataAndStart = () => {
        try {
          setErrorMessage('');
          if (!horseCsvText || !raceCsvText) {
            setErrorMessage('エラー：両方のCSVファイルをアップロードしてください。');
            return;
          }

          const horses = csvToArray(horseCsvText);
          const races = csvToArray(raceCsvText);

          if (horses.length === 0) {
            setErrorMessage('エラー：馬データCSVを解析できませんでした。空ファイルかヘッダー破損の可能性があります。');
            return;
          }
          if (races.length === 0) {
            setErrorMessage('エラー：競走データCSVを解析できませんでした。空ファイルかヘッダー破損の可能性があります。');
            return;
          }

          const processed = processPOGData(horses, races);

          if (!processed.results || processed.results.length === 0) {
            setErrorMessage('エラー：集計結果が0件です。馬データの「オーナー」名や競走データの「オーナー名」カラムに不一致がないか確認してください。');
            return;
          }

          setResultsData(processed.results);
          setOverallData(processed.overall);
          changeStep(0);
        } catch (error) {
          console.error(error);
          setErrorMessage(`集計解析中にシステムエラーが発生しました：${error.message}`);
        }
      };

      const changeStep = (newStep) => {
        setIsVisible(false);
        setTimeout(() => { setStep(newStep); setIsVisible(true); }, 400);
      };

                {raceCsvText && <p className="text-xs text-cyan-400 mt-2 font-bold flex items-center gap-1">✓ アップロード完了</p>}
              </div>
              <button onClick={processDataAndStart} disabled={!horseCsvText || !raceCsvText} className="w-full mt-6 bg-gradient-to-r from-yellow-500 to-amber-500 text-slate-950 font-black py-3.5 px-4 rounded-2xl transition-all transform hover:scale-[1.02] flex justify-center items-center gap-2 shadow-lg shadow-yellow-500/10">解析を実行して発表へ進む <IconChevronRight size={18} /></button>
            </div>
          </div>
        );
      }

      if (step === 0) {
        return (
          <div className="min-h-screen flex flex-col bg-slate-950 transition-opacity duration-500 relative overflow-hidden items-center justify-center p-6">
            <GlobalHeader />
            <div className="flex-grow flex flex-col items-center justify-center relative z-10 max-w-2xl text-center">
              <IconTrophy size={100} className="text-yellow-400 mb-8 animate-pulse" />
              <h1 className="text-5xl md:text-7xl font-black text-white mb-4 tracking-widest uppercase">PUTTA POG</h1>
              <h2 className="text-xl md:text-2xl font-bold text-slate-400 mb-12 tracking-widest">2025-2026 シーズン 結果発表会</h2>
              <button onClick={handleNext} className="bg-gradient-to-r from-rose-600 to-rose-500 text-white text-lg md:text-xl font-black py-4 px-10 rounded-2xl shadow-xl transition-all flex items-center gap-3 transform hover:scale-105">第 {resultsData.length} 位の発表へ <IconChevronRight size={22} /></button>
            </div>
          </div>
        );
      }

      // --- 各種ランキングページの分岐描画 ---
      if (step > resultsData.length) {
        const formatRecordFn = (p) => `[${p.stats.record.join('-')}]（全${p.stats.startsValue}走）`;
        const N = resultsData.length;

        if (step === N + 1) return renderSubRanking("総出走数", <IconActivity size={60} className="text-blue-400"/>, [...resultsData].sort((a,b) => b.stats.startsValue - a.stats.startsValue), (p) => p.stats.startsValue, "走");
        if (step === N + 2) return renderSubRanking("勝率", <IconTarget size={60} className="text-rose-400"/>, [...resultsData].sort((a,b) => b.stats.winRateValue - a.stats.winRateValue), (p) => p.stats.winRateValue, "%", false, formatRecordFn);
        if (step === N + 3) return renderSubRanking("連対率", <IconTrendingUp size={60} className="text-amber-400"/>, [...resultsData].sort((a,b) => b.stats.top2RateValue - a.stats.top2RateValue), (p) => p.stats.top2RateValue, "%", false, formatRecordFn);
        if (step === N + 4) return renderSubRanking("5着内率", <IconShieldCheck size={60} className="text-emerald-400"/>, [...resultsData].sort((a,b) => b.stats.top5RateValue - a.stats.top5RateValue), (p) => p.stats.top5RateValue, "%", false, formatRecordFn);
        if (step === N + 5) return renderOverallRanking("種牡馬 (全体)", <IconCrown size={60} className="text-yellow-500"/>, overallData.sires, "points", "pt");
        if (step === N + 6) return renderOverallRanking("厩舎 (全体)", <IconBriefcase size={60} className="text-indigo-400"/>, overallData.trainers, "points", "pt");
        if (step === N + 7) return renderOverallRanking("騎手 (全体)", <IconUsers size={60} className="text-teal-400"/>, overallData.jockeys, "points", "pt");
        if (step === N + 8) return renderGlobalBonusPage();
        if (step === N + 9) return renderFinalChampionship();
      }

      // === 個別オーナー発表画面 ===
      const currentData = resultsData[resultsData.length - step];
      const isTop3 = currentData.rank <= 3;
      const isWinner = currentData.rank === 1;
      const cardGlowClass = isWinner ? "glow-gold" : currentData.rank === 2 ? "glow-cyan" : currentData.rank === 3 ? "glow-rose" : "border-slate-900";

      // 当該オーナーの獲得ボーナス抽出
      const myBonuses = OWNER_BONUS_RESULTS[currentData.name] || [];

      return (
        <div className="min-h-screen flex flex-col transition-all duration-700 bg-slate-950 overflow-x-hidden">
          <GlobalHeader />
          <div className="flex-grow flex items-start justify-center p-4 md:p-8">
            <div className={`w-full max-w-6xl bg-slate-900/20 backdrop-blur-xl rounded-[32px] shadow-2xl overflow-hidden border p-5 md:p-10 relative ${cardGlowClass}`}>

              <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center border-b border-slate-900 pb-8 mb-8 gap-6">
                <div className="flex flex-col gap-4 flex-grow w-full lg:w-auto">
                  <div className="flex items-center gap-3">
                    {isTop3 ? <IconMedal size={36} className={currentData.textColor} /> : <div className="w-1.5 h-8 bg-white/20 rounded-full"></div>}
                    <h2 className={`text-4xl md:text-5xl font-black ${currentData.textColor} tracking-wider`}>第 {currentData.rank} 位</h2>
                  </div>
                  <h3 className="text-5xl md:text-7xl font-black text-white break-words tracking-tight">{currentData.name}</h3>
                  <div className="mt-2 bg-slate-950/40 p-4 rounded-2xl border border-slate-900 max-w-sm">
                    <p className="text-slate-500 font-bold text-xs tracking-wider mb-1">総獲得ポイント</p>
                    <p className={`text-5xl md:text-6xl font-black ${currentData.textColor} tracking-tight font-mono`}>{currentData.points.toLocaleString()} <span className="text-lg font-medium text-slate-400">pt</span></p>
                  </div>
                </div>

                {currentData.image && (
                  <div className="w-full lg:w-1/2 xl:w-5/12 flex-shrink-0 self-start lg:self-center">
                    <div className="w-full bg-slate-950/60 rounded-3xl p-4 border border-slate-900 shadow-2xl flex flex-col justify-center">
                      <h4 className="flex items-center gap-2 text-slate-300 font-bold text-xs tracking-wider mb-3"><IconCamera size={14} className="text-emerald-400"/> 代表馬: {currentData.image.horseName}</h4>
                      <div className="relative w-full aspect-video rounded-2xl overflow-hidden border border-slate-800/80 bg-slate-950 flex items-center justify-center">
                        <img src={`./${currentData.image.url}`} alt={currentData.image.horseName} className="w-full h-full object-cover" onError={(e) => { e.target.onerror = null; e.target.src = 'data:image/svg+xml;charset=UTF-8,%3Csvg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="%23334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"%3E%3Cpath d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/%3E%3Ccircle cx="12" cy="13" r="3"/%3E%3C/svg>'; }} />
                      </div>
                    </div>
                  </div>
                )}
              </div>

              <div className="mb-12">
                <h4 className="flex items-center gap-2 text-slate-200 font-black mb-5 text-lg tracking-wider"><IconTarget size={18} className="text-emerald-400"/> 成績分析</h4>
                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                   <LargeStatBox icon={<IconActivity size={18}/>} label="総出走数" value={`${currentData.stats.starts.value}`} subtext="15頭通算" rank={currentData.stats.starts.rank} glowClass="hover:border-blue-500/30" />
                   <LargeStatBox icon={<IconTarget size={18}/>} label="勝率" value={`${currentData.stats.winRate.value}%`} subtext={`${currentData.stats.winsValue}勝`} rank={currentData.stats.winRate.rank} glowClass="hover:border-rose-500/30" />
                   <LargeStatBox icon={<IconTrendingUp size={18}/>} label="連対率" value={`${currentData.stats.top2Rate.value}%`} subtext={`${currentData.stats.top2Value}回`} rank={currentData.stats.top2Rate.rank} glowClass="hover:border-amber-500/30" />
                   <LargeStatBox icon={<IconShieldCheck size={18}/>} label="5着内率" value={`${currentData.stats.top5Rate.value}%`} subtext={`${currentData.stats.top5Value}回`} rank={currentData.stats.top5Rate.rank} glowClass="hover:border-emerald-500/30" />
                </div>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div className="space-y-6">
                  <div className="bg-slate-900/20 rounded-3xl p-6 border border-slate-900 shadow-xl">
                    <h4 className="flex items-center gap-2 text-slate-200 font-black mb-5 text-base tracking-wider"><IconStar size={18} className="text-yellow-400 fill-yellow-400/20"/> 主力馬</h4>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      {currentData.topHorses.map((horse, i) => (
                        <div key={i} className="bg-slate-950/40 p-4 rounded-2xl border border-slate-900 hover:border-yellow-500/20 transition-all">
                          <p className="text-lg font-bold text-white mb-2 truncate">{horse.name}</p>
                          <div className="flex flex-col gap-1.5">
                            <p className="text-emerald-400 text-xs font-bold flex items-center gap-1.5 truncate bg-emerald-500/5 px-2.5 py-1 rounded-lg border border-emerald-500/10 w-fit">{horse.isGraded && <IconTrophy size={12} className="text-yellow-500"/>} {horse.majorWin}</p>
                            <p className="text-yellow-400 font-mono text-sm text-right font-black">{horse.points.toLocaleString()} pt</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="bg-slate-900/10 rounded-3xl p-6 border-l-4 border-slate-700/60 shadow-inner">
                    <h4 className="flex items-center gap-2 text-slate-400 font-bold mb-3 text-xs tracking-wider"><IconActivity size={14} className="text-blue-400"/> 総評</h4>
                    {Array.isArray(currentData.topics) ? (
                      <ul className="space-y-2.5">
                        {currentData.topics.map((point, i) => (
                          <li key={i} className="flex items-start gap-2.5 text-slate-200 text-sm leading-relaxed font-medium">
                            <span className="text-yellow-400 mt-1.5 text-[8px] flex-shrink-0">●</span>
                            <span className="flex-1">{point}</span>
                          </li>
                        ))}
                      </ul>
                    ) : (
                      <p className="text-slate-200 text-sm leading-relaxed font-medium">{currentData.topics}</p>
                    )}
                  </div>
                </div>

                <div className="space-y-6">
                  <div className="bg-slate-900/20 rounded-3xl p-6 border border-slate-900 shadow-xl">
                    <h4 className="flex items-baseline justify-between text-slate-200 font-black mb-4 text-base tracking-wider"><div className="flex items-center gap-2"><IconBarChart2 size={18} className="text-cyan-400"/> 関係者・血統</div><span className="text-[10px] font-normal text-slate-500 tracking-wider">※[1-2-3-4-5-外]</span></h4>
                    <div className="space-y-1">
                      <AttributeRow icon={<IconCrown size={18} className="text-yellow-500"/>} label="稼ぎ頭の種牡馬" data={{ name: currentData.stats.bestSire.name, detail: `${(currentData.stats.bestSire.points || 0).toLocaleString()} pt` }} record={currentData.stats.bestSire.name !== '-' ? `[${currentData.stats.bestSire.record.join('-')}]（全${currentData.stats.bestSire.starts}走）` : null} />
                      <AttributeRow icon={<IconBriefcase size={18}/>} label="稼ぎ頭の厩舎" data={{ name: currentData.stats.bestTrainer.name, detail: `${(currentData.stats.bestTrainer.points || 0).toLocaleString()} pt` }} record={currentData.stats.bestTrainer.name !== '-' ? `[${currentData.stats.bestTrainer.record.join('-')}]（全${currentData.stats.bestTrainer.starts}走）` : null} />
                      <AttributeRow icon={<IconUsers size={18} className="text-indigo-400"/>} label="最多騎乗 騎手" data={{ name: currentData.stats.mostRidesJockey.name, detail: `${currentData.stats.mostRidesJockey.starts}戦` }} record={currentData.stats.mostRidesJockey.name !== '-' ? `[${currentData.stats.mostRidesJockey.record.join('-')}]（全${currentData.stats.mostRidesJockey.starts}走）` : null} />
                      <AttributeRow icon={<IconAward size={18} className="text-rose-400"/>} label={currentData.stats.bestRateJockey.starts >= 3 ? "最高勝率 騎手 (3戦以上)" : "最高勝率 騎手"} data={{ name: currentData.stats.bestRateJockey.name, detail: `${currentData.stats.bestRateJockey.winRate}%` }} record={currentData.stats.bestRateJockey.name !== '-' ? `[${currentData.stats.bestRateJockey.record.join('-')}]（全${currentData.stats.bestRateJockey.starts}走）` : null} />
                    </div>
                  </div>

                  <div className="bg-slate-900/20 rounded-3xl p-6 border border-slate-900 shadow-xl">
                    <h4 className="flex items-center gap-2 text-slate-200 font-black mb-4 text-base tracking-wider"><IconMapPin size={18} className="text-rose-400"/> 適性分析</h4>
                    <div className="space-y-4">
                      <div>
                        <p className="text-[10px] text-slate-500 font-black tracking-wider uppercase">ドラフト貢献度 (ポイント比率)</p>
                        <RatioBar leftLabel="上位指名(1〜5位)" leftValue={currentData.stats.draftAnalysis.top} leftColor="bg-gradient-to-r from-rose-600 to-rose-500" rightLabel="下位指名(6〜15位)" rightValue={currentData.stats.draftAnalysis.low} rightColor="bg-gradient-to-r from-blue-600 to-blue-500" />
                      </div>
                      <div>
                        <p className="text-[10px] text-slate-500 font-black tracking-wider uppercase">所属適性 (ポイント比率)</p>
                        <RatioBar leftLabel="関西馬(栗東)" leftValue={currentData.stats.centerAnalysis.ritto} leftColor="bg-gradient-to-r from-amber-500 to-amber-400" rightLabel="関東馬(美浦)" rightValue={currentData.stats.centerAnalysis.miho} rightColor="bg-gradient-to-r from-teal-500 to-teal-400" />
                      </div>
                      <div>
                        <p className="text-[10px] text-slate-500 font-black tracking-wider uppercase">馬場適性 (獲得賞金比率)</p>
                        <RatioBar leftLabel="芝" leftValue={currentData.stats.trackAnalysis.turf} leftColor="bg-gradient-to-r from-emerald-500 to-emerald-400" rightLabel="ダート" rightValue={currentData.stats.trackAnalysis.dirt} rightColor="bg-gradient-to-r from-amber-700 to-amber-600" />
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div className="mt-12 bg-slate-900/10 rounded-3xl p-6 border border-slate-900">
                <h4 className="flex items-center gap-2 text-slate-300 font-black mb-5 text-base tracking-wider"><IconList size={18} className="text-purple-400"/> 指名馬一覧 (獲得ポイント順 / 全15頭)</h4>
                <div className="overflow-x-auto rounded-2xl border border-slate-800/80">
                  <table className="w-full text-sm text-left whitespace-nowrap relative">
                    <thead className="text-[11px] text-slate-400 bg-slate-950/60 uppercase border-b border-slate-800 tracking-wider font-bold">
                      <tr>
                        <th className="px-5 py-4 text-center">指名順</th>
                        <th className="px-5 py-4">馬名</th>
                        <th className="px-5 py-4">父</th>
                        <th className="px-5 py-4">厩舎(所属)</th>
                        <th className="px-5 py-4 text-right">獲得ポイント</th>
                        <th className="px-5 py-4">主な勝ち鞍 / 現況</th>
                        <th className="px-5 py-4 text-center">着度数</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-800/40">
                      {currentData.horses.map((horse, idx) => (
                        <tr key={idx} className="hover:bg-slate-900/40 transition-colors">
                          <td className="px-5 py-4 text-slate-500 font-mono text-center font-bold">{horse.draftRank}</td>
                          <td className="px-5 py-4 font-black text-white">{horse.name}</td>
                          <td className="px-5 py-4 text-slate-300 text-xs font-semibold">{horse.sire}</td>
                          <td className="px-5 py-4 text-slate-400 text-xs">{horse.trainer} ({horse.center})</td>
                          <td className="px-5 py-4 text-right text-yellow-400 font-mono font-black">{horse.points.toLocaleString()} pt</td>
                          <td className="px-5 py-4 text-slate-300 text-xs">{horse.isGraded && <span className="inline-block mr-1.5 text-yellow-500"><IconTrophy size={12} className="inline"/></span>}{horse.majorWin}</td>
                          <td className="px-5 py-4 text-center font-mono tracking-wider text-emerald-400 bg-slate-950/20 text-xs">[{horse.record.join('-')}]<span className="text-[10px] text-slate-500 ml-1">（全{horse.starts}走）</span></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* オーナーの獲得ボーナスセクション（ページ末尾） */}
              <div className="mt-8 bg-slate-900/20 rounded-3xl p-6 border border-slate-900 shadow-xl">
                <h4 className="flex items-center gap-2 text-slate-200 font-black mb-4 text-base tracking-wider"><IconGift size={18} className="text-yellow-400" /> 獲得ボーナス</h4>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                  {BONUS_MASTER.map(master => {
                    const hasBonus = myBonuses.find(b => b.id === master.id);
                    return (
                      <div key={master.id} className={`p-3 rounded-xl border flex items-center justify-between transition-colors ${hasBonus ? 'bg-yellow-500/5 border-yellow-500/30' : 'bg-slate-950/20 border-slate-900/40 opacity-40'}`}>
                        <div className="flex items-center gap-3">
                          <span className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-mono font-bold flex-shrink-0 ${hasBonus ? 'bg-yellow-500 text-slate-950' : 'bg-slate-800 text-slate-500'}`}>{master.id}</span>
                          <div>
                            <p className="text-xs font-black text-white">{master.name}</p>
                            {hasBonus && <p className="text-[11px] text-yellow-400 font-medium mt-0.5">{hasBonus.detail}</p>}
                          </div>
                        </div>
                        {hasBonus && <span className="text-[9px] font-bold px-2 py-0.5 bg-yellow-500/10 text-yellow-400 border border-yellow-500/20 rounded-md font-mono flex-shrink-0 ml-2">{master.reward}</span>}
                      </div>
                    );
                  })}
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
